name: PR Agent

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  SHARED_SECRETS_PROJECT: "53407187172"
  PR_AGENT_GEMINI_SECRET: "GEMINI_API_KEY"

jobs:
  pr_agent:
    name: AI Code Review (Gemini)
    runs-on: ubuntu-latest
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name == 'pull_request_target' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request &&
         contains(github.event.comment.body, '/'))
      )
    
    steps:
      - name: Authenticate to GCP for PR review
        uses: google-github-actions/auth@v2
        with:
          # Prefer replacing this with a dedicated read-only PR-agent accessor later.
          credentials_json: ${{ secrets.GCP_SA_KEY_UAT }}

      - name: Install gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Load Gemini API key from Secret Manager
        id: gemini-key
        shell: bash
        run: |
          set -euo pipefail
          gemini_api_key="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="$PR_AGENT_GEMINI_SECRET")"
          if [ -z "$gemini_api_key" ]; then
            echo "::error::Secret '$PR_AGENT_GEMINI_SECRET' is empty in project '$SHARED_SECRETS_PROJECT'."
            exit 1
          fi

          echo "::add-mask::$gemini_api_key"
          printf 'gemini_api_key=%s\n' "$gemini_api_key" >> "$GITHUB_OUTPUT"

      - name: PR Agent Action
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ steps.gemini-key.outputs.gemini_api_key }}
          config.model: "gemini/gemini-2.5-pro"
          config.fallback_models: '["gemini/gemini-2.5-pro","gemini/gemini-2.5-flash"]'
          config.max_model_tokens: "128000"
          config.custom_model_max_tokens: "1048576"
          config.ai_timeout: "480"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened","synchronize","reopened","ready_for_review","review_requested"]'
