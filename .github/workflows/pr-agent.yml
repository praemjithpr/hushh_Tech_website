# PR-Agent: AI-Powered Code Review
# Uses OpenAI GPT to provide intelligent code review suggestions

name: PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr_agent:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Run on PR events or when commenting on a PR with /review, /improve, /describe, etc.
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && 
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/'))
    
    steps:
      - name: PR Agent Action
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Configuration
          PR_AGENT_CONFIG: |
            [pr_reviewer]
            # Enable automatic review on PR open
            auto_review = true
            # Provide inline suggestions
            inline_code_comments = true
            # Review effort estimation
            estimate_effort = true
            
            [pr_description]
            # Auto-generate PR descriptions
            auto_description = true
            
            [pr_code_suggestions]
            # Provide code improvement suggestions
            auto_improve = true
            # Maximum suggestions per PR
            num_code_suggestions = 4
            
            [github_action]
            # Automatically run on new PRs
            auto_review = true
            auto_describe = true
            auto_improve = true
