name: Deploy to PROD
on:
  workflow_dispatch:
    inputs:
      sha:
        description: Exact green main SHA to deploy to production
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: deploy-production-${{ github.event.inputs.sha || github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20.19.0"
  SMOKE_BASE_URL: https://hushhtech.com
  SHARED_SECRETS_PROJECT: "53407187172"
  VITE_SUPABASE_REDIRECT_URL: https://hushhtech.com/auth/callback
  VITE_PLAID_REDIRECT_URI: https://hushhtech.com/onboarding/financial-link
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_ANON_KEY: ci-anon-key
  VITE_ALLOW_INSECURE_BROWSER_LLM: "false"

jobs:
  deploy:
    name: Build & Deploy to Cloud Run (PROD)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: Production – hushh-tech
      url: https://hushhtech.com
    steps:
      - name: Assert manual dispatch originates from main
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Refusing production deploy from '${GITHUB_REF_NAME}'. Trigger this workflow from 'main' only."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Validate deployment SHA against green main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRED_BRANCH: main
          REQUIRE_CI_SUCCESS: "1"
          REQUIRED_CHECK_NAME: Main Post-Merge Smoke Gate
        run: bash scripts/ci/require-deploy-sha-on-main.sh "${{ github.event.inputs.sha }}"

      - name: Checkout deployment SHA
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${{ github.event.inputs.sha }}"

      # 1. Prepare Node.js and dependencies
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --no-audit --no-fund

      # 2. Auth with GCP and load shared web-build secrets
      # Prefer an environment-scoped GCP_SA_KEY_PROD secret so deploy approval gates access.
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project context
        run: gcloud config set project hushh-tech-prod

      - name: Assert GCP project scope
        shell: bash
        run: |
          set -euo pipefail
          ACTIVE_PROJECT="$(gcloud config get-value project 2>/dev/null)"
          if [ "$ACTIVE_PROJECT" != "hushh-tech-prod" ]; then
            echo "Refusing deploy: expected project 'hushh-tech-prod' but got '$ACTIVE_PROJECT'."
            exit 1
          fi

      - name: Load web auth build env from Secret Manager
        shell: bash
        run: |
          set -euo pipefail
          supabase_url="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="SUPABASE_URL")"
          supabase_anon_key="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="SUPABASE_ANON_KEY")"
          supabase_service_role_key="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="SUPABASE_SERVICE_ROLE_KEY")"
          analytics_hash_salt="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="ANALYTICS_HASH_SALT" 2>/dev/null || true)"
          ga4_property_id="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="GA4_PROPERTY_ID" 2>/dev/null || true)"
          ga4_allowed_hostnames="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="GA4_ALLOWED_HOSTNAMES" 2>/dev/null || true)"
          search_console_site_url="$(gcloud secrets versions access latest --project="$SHARED_SECRETS_PROJECT" --secret="SEARCH_CONSOLE_SITE_URL" 2>/dev/null || true)"
          if [ -z "$supabase_url" ] || [ -z "$supabase_anon_key" ]; then
            echo "::error::Supabase web auth secrets are empty"
            exit 1
          fi
          if [ -z "$supabase_service_role_key" ]; then
            echo "::error::Supabase service role secret is empty"
            exit 1
          fi
          echo "::add-mask::$supabase_url"
          echo "::add-mask::$supabase_anon_key"
          echo "::add-mask::$supabase_service_role_key"
          [ -n "$analytics_hash_salt" ] && echo "::add-mask::$analytics_hash_salt"
          [ -n "$ga4_property_id" ] && echo "::add-mask::$ga4_property_id"
          [ -n "$ga4_allowed_hostnames" ] && echo "::add-mask::$ga4_allowed_hostnames"
          [ -n "$search_console_site_url" ] && echo "::add-mask::$search_console_site_url"
          printf 'VITE_SUPABASE_URL=%s\n' "$supabase_url" >> "$GITHUB_ENV"
          printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$supabase_anon_key" >> "$GITHUB_ENV"
          printf 'SUPABASE_URL=%s\n' "$supabase_url" >> "$GITHUB_ENV"
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$supabase_service_role_key" >> "$GITHUB_ENV"
          [ -n "$analytics_hash_salt" ] && printf 'ANALYTICS_HASH_SALT=%s\n' "$analytics_hash_salt" >> "$GITHUB_ENV"
          [ -n "$ga4_property_id" ] && printf 'GA4_PROPERTY_ID=%s\n' "$ga4_property_id" >> "$GITHUB_ENV"
          [ -n "$ga4_allowed_hostnames" ] && printf 'GA4_ALLOWED_HOSTNAMES=%s\n' "$ga4_allowed_hostnames" >> "$GITHUB_ENV"
          [ -n "$search_console_site_url" ] && printf 'SEARCH_CONSOLE_SITE_URL=%s\n' "$search_console_site_url" >> "$GITHUB_ENV"
          printf 'GCP_MONITORING_PROJECT_ID=hushh-tech-prod\n' >> "$GITHUB_ENV"
          printf 'GCP_CLOUD_RUN_REGION=us-central1\n' >> "$GITHUB_ENV"
          printf 'GCP_CLOUD_RUN_SERVICES=hushh-tech-website\n' >> "$GITHUB_ENV"
          printf 'SEARCH_CONSOLE_TYPE=web\n' >> "$GITHUB_ENV"
          printf 'SEARCH_CONSOLE_DATA_STATE=all\n' >> "$GITHUB_ENV"
          printf 'SEARCH_CONSOLE_ROW_LIMIT=25\n' >> "$GITHUB_ENV"

      # 3. Build Vite app in runner (FAST)
      - name: Validate client auth env
        shell: bash
        run: |
          missing=0
          for name in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_SUPABASE_REDIRECT_URL VITE_PLAID_REDIRECT_URI VITE_ALLOW_INSECURE_BROWSER_LLM; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for the web auth build"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ "$VITE_ALLOW_INSECURE_BROWSER_LLM" != "false" ]; then
            echo "::error::VITE_ALLOW_INSECURE_BROWSER_LLM must remain false in production."
            exit 1
          fi
      - run: npm run env:check
      - run: npm run build:web

      # 4. Deploy pre-built dist/ to Cloud Run (runtime-only Dockerfile)
      - name: Deploy to Cloud Run
        shell: bash
        run: |
          runtime_env="NODE_ENV=production,SUPABASE_URL=${SUPABASE_URL},SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
          for name in ANALYTICS_HASH_SALT GA4_PROPERTY_ID GA4_ALLOWED_HOSTNAMES GCP_MONITORING_PROJECT_ID GCP_CLOUD_RUN_REGION GCP_CLOUD_RUN_SERVICES SEARCH_CONSOLE_SITE_URL SEARCH_CONSOLE_TYPE SEARCH_CONSOLE_DATA_STATE SEARCH_CONSOLE_ROW_LIMIT; do
            if [ -n "${!name:-}" ]; then
              runtime_env="${runtime_env},${name}=${!name}"
            fi
          done
          gcloud run deploy hushh-tech-website \
            --source . \
            --project=hushh-tech-prod \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=10 \
            --port=8080 \
            --update-env-vars="$runtime_env" \
            --clear-base-image \
            --quiet

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke OAuth startup on deployed host
        run: node scripts/smoke-oauth-start.mjs "$SMOKE_BASE_URL" > /tmp/prod-oauth-smoke.json

      - name: Upload production smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-oauth-smoke
          if-no-files-found: error
          path: /tmp/prod-oauth-smoke.json
